{% load static %}
<header class="header header--loggedIn">
    <div class="container">
        <a href="{% url 'home' %}" class="header__logo">
            <img src="{% static 'images/logo.svg' %}" />
            <h1>StudyBuddy</h1>
        </a>
        <form class="header__search" method="GET" action="{% url 'home' %}">
            <label>
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                    <title>search</title>
                    <path
                        d="M32 30.586l-10.845-10.845c1.771-2.092 2.845-4.791 2.845-7.741 0-6.617-5.383-12-12-12s-12 5.383-12 12c0 6.617 5.383 12 12 12 2.949 0 5.649-1.074 7.741-2.845l10.845 10.845 1.414-1.414zM12 22c-5.514 0-10-4.486-10-10s4.486-10 10-10c5.514 0 10 4.486 10 10s-4.486 10-10 10z">
                    </path>
                </svg>
                <input name="q" placeholder="Search for posts" />
            </label>
        </form>
        <nav class="header__menu">
            <!-- Invitations Notification Bell -->
            {% if request.user.is_authenticated %}
            <!-- <a href="{% url 'invitations' %}" class="notification-bell" style="position: relative; margin-right: 20px; display: flex; align-items: center; justify-content: center; height: 40px; width: 40px;">
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32" style="fill: var(--color-light);">
                    <title>notification</title>
                    <path d="M16 32c-2.206 0-4-1.794-4-4h8c0 2.206-1.794 4-4 4zM28 22v4h-24v-4c0-4.418 3.582-8 8-8v-3.5c0-2.481 2.019-4.5 4.5-4.5s4.5 2.019 4.5 4.5v3.5c4.418 0 8 3.582 8 8z"></path>
                </svg>
                <span id="invite-notification-badge" style="display: none; position: absolute; top: 0px; right: 0px; background-color: var(--color-main); color: white; border-radius: 50%; padding: 2px 6px; font-size: 1rem; font-weight: bold; line-height: 1;">!</span>
            </a> -->
            <script>
                const notificationSocketUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/notifications/';
                const notificationSocket = new WebSocket(notificationSocketUrl);

                notificationSocket.onmessage = function(e) {
                    const data = JSON.parse(e.data);
                    if (data.type === 'send_notification') {
                        const badge = document.getElementById('invite-notification-badge');
                        if (badge) {
                            badge.style.display = 'block';
                        }
                        
                        // Hiển thị Toast thông báo đẹp mắt
                        const toast = document.createElement('div');
                        toast.style.position = 'fixed';
                        toast.style.bottom = '20px';
                        toast.style.right = '20px';
                        toast.style.backgroundColor = 'var(--color-main)';
                        toast.style.color = 'white';
                        toast.style.padding = '15px 25px';
                        toast.style.borderRadius = '8px';
                        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
                        toast.style.zIndex = '1000';
                        toast.style.fontSize = '1.4rem';
                        toast.style.transition = 'all 0.5s ease';
                        toast.innerHTML = data.message + ` <a href="/invitations/" style="color: white; font-weight: bold; text-decoration: underline; margin-left: 10px;">Xem ngay</a>`;
                        document.body.appendChild(toast);
                        
                        setTimeout(() => {
                            toast.style.opacity = '0';
                            setTimeout(() => toast.remove(), 500);
                        }, 6000);
                    }
                };

                notificationSocket.onclose = function(e) {
                    console.log('Notification socket closed unexpectedly');
                };
            </script>
            {% endif %}

            <!-- Logged In -->
            {% if request.user.is_authenticated %}
            <div style="display: flex; align-items: center; gap: 2rem;">
                <!-- Notification Bell (left of avatar) -->
                <a href="{% url 'invitations' %}" class="notification-bell" style="position: relative; display: flex; align-items: center; justify-content: center; height: 40px; width: 40px;">
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 32 32" style="fill: var(--color-light);">
                        <title>notification</title>
                        <path d="M16 32c-2.206 0-4-1.794-4-4h8c0 2.206-1.794 4-4 4zM28 22v4h-24v-4c0-4.418 3.582-8 8-8v-3.5c0-2.481 2.019-4.5 4.5-4.5s4.5 2.019 4.5 4.5v3.5c4.418 0 8 3.582 8 8z"></path>
                    </svg>
                    <span id="invite-notification-badge" style="display: none; position: absolute; top: -2px; right: -2px; background-color: var(--color-main); color: white; border-radius: 50%; padding: 2px 5px; font-size: 1rem; font-weight: bold; line-height: 1;">!</span>
                </a>
                
                <div class="header__user" style="display: flex; align-items: center; gap: 1.5rem;">
                    <a href="{% url 'update-user' %}" style="display: flex; align-items: center; gap: 1rem;">
                        <div class="avatar avatar--medium active">
                            <img src="{{request.user.avatar.url}}" />
                        </div>
                        <p>{{request.user.username}} <span style="display: block;">@{{request.user.username}}</span></p>
                    </a>
                    <button class="dropdown-button">
                        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                            <title>chevron-down</title>
                            <path d="M16 21l-13-13h-3l16 16 16-16h-3l-13 13z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            {% else %}

            <!-- Not Logged In -->
            <a href="{% url 'login' %}">
                <img src="{% static 'images/avatar.svg' %}" />
                <p>Login</p>
            </a>
            {% endif %}

            <div class="dropdown-menu">
                <a href="{% url 'update-user' %}" class="dropdown-link"><svg version="1.1"
                        xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                        <title>tools</title>
                        <path
                            d="M27.465 32c-1.211 0-2.35-0.471-3.207-1.328l-9.392-9.391c-2.369 0.898-4.898 0.951-7.355 0.15-3.274-1.074-5.869-3.67-6.943-6.942-0.879-2.682-0.734-5.45 0.419-8.004 0.135-0.299 0.408-0.512 0.731-0.572 0.32-0.051 0.654 0.045 0.887 0.277l5.394 5.395 3.586-3.586-5.394-5.395c-0.232-0.232-0.336-0.564-0.276-0.887s0.272-0.596 0.572-0.732c2.552-1.152 5.318-1.295 8.001-0.418 3.274 1.074 5.869 3.67 6.943 6.942 0.806 2.457 0.752 4.987-0.15 7.358l9.392 9.391c0.844 0.842 1.328 2.012 1.328 3.207-0 2.5-2.034 4.535-4.535 4.535zM15.101 19.102c0.26 0 0.516 0.102 0.707 0.293l9.864 9.863c0.479 0.479 1.116 0.742 1.793 0.742 1.398 0 2.535-1.137 2.535-2.535 0-0.668-0.27-1.322-0.742-1.793l-9.864-9.863c-0.294-0.295-0.376-0.74-0.204-1.119 0.943-2.090 1.061-4.357 0.341-6.555-0.863-2.631-3.034-4.801-5.665-5.666-1.713-0.561-3.468-0.609-5.145-0.164l4.986 4.988c0.391 0.391 0.391 1.023 0 1.414l-5 5c-0.188 0.188-0.441 0.293-0.707 0.293s-0.52-0.105-0.707-0.293l-4.987-4.988c-0.45 1.682-0.397 3.436 0.164 5.146 0.863 2.631 3.034 4.801 5.665 5.666 2.2 0.721 4.466 0.604 6.555-0.342 0.132-0.059 0.271-0.088 0.411-0.088z">
                        </path>
                    </svg>
                    Settings</a>
                <a href="{% url 'logout' %}" class="dropdown-link"><svg version="1.1" xmlns="http://www.w3.org/2000/svg"
                        width="32" height="32" viewBox="0 0 32 32">
                        <title>sign-out</title>
                        <path
                            d="M3 0h22c0.553 0 1 0 1 0.553l-0 3.447h-2v-2h-20v28h20v-2h2l0 3.447c0 0.553-0.447 0.553-1 0.553h-22c-0.553 0-1-0.447-1-1v-30c0-0.553 0.447-1 1-1z">
                        </path>
                        <path
                            d="M21.879 21.293l1.414 1.414 6.707-6.707-6.707-6.707-1.414 1.414 4.293 4.293h-14.172v2h14.172l-4.293 4.293z">
                        </path>
                    </svg>
                    Logout</a>
            </div>
        </nav>
    </div>
</header>
